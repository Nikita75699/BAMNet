architecture: boundary_aware_manet_v4        # v4: упрощенная архитектура точек
encoder_name: efficientnet_v2_m          # или _m/_l
num_classes: 1
warmup_epochs: 5

lr: 5e-4                               # Optuna Best
loss:
  w_bce: 1.0
  w_dice: 1.0
  w_pts: 0.5                  # Optuna Best
  w_bnd: 10.0                 # Optuna Best
  point_sigma: 3.0            # Optuna Best
  focal:
    use_focal_seg: false
    alpha: 0.25
    gamma: 2.0
  improved_points:
    enabled: true
    alpha: 0.25
    beta: 0.10
    gamma: 2.0  

data_path: /home/nikita/project/segpoint/export_project/segpoint_folds/fold_01
batch_size: 14
img_size: 640
num_workers: 6
augment: true
num_points: 4
point_names: ["AA1", "AA2", "STJ1", "STJ2"]

logging:
  save_dir: runs
  experiment_name: aortic_ring_v4

trainer:
  epochs: 35
  devices: 1
  precision: auto
  monitor: "val/dice"
  mode: "max"

attention:
  coordinate: true      # CoordinateAttention в head точек
  decoder: true         # <<< ВКЛ/ВЫКЛ глобальное attention в декодере
  decoder_attn_levels: 2  # на скольких первых уровнях декодера включать
  max_attn_tokens: 4096   # максимум H*W внутри attention

fusion:
  enabled: true           # <<< ВКЛ/ВЫКЛ deep+decoder fusion
  point_head_channels: 256

boundary:
  loss_enabled: true       # v4: включено
  guidance_enabled: true   # v4: включено настоящее использование

offsets:
  enabled: false           # v4: отключено (не нужно при softargmax)

softargmax:
  beta_mode: "schedule"
  beta_start: 2.0
  beta_end: 12       # Optuna Best
  beta_warmup_epochs: 12 # Optuna Best
